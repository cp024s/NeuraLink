<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>NeuraLink UI</title>
  <style>
    html, body { width:100%; height:100%; }
    body { margin:0; font-family: "Segoe UI", Tahoma, sans-serif; background:#f3f6fb; color:#0f172a; overflow-x:hidden; }
    .wrap { width:100%; min-height:100vh; margin:0; padding: clamp(12px, 2vw, 20px); display:grid; grid-template-rows: auto 1fr; gap:14px; }
    .hero { background: linear-gradient(140deg, #dbeafe, #f8fafc); border:1px solid #dbe5f1; border-radius:12px; padding:16px; overflow:hidden; }
    .grid { display:grid; grid-template-columns: repeat(auto-fit, minmax(160px,1fr)); gap:10px; margin-top:12px; }
    label { font-size:12px; color:#475569; display:block; margin-bottom:4px; }
    input, select { width:100%; padding:8px; border:1px solid #cbd5e1; border-radius:8px; }
    button { margin-top:12px; padding:10px 14px; border:none; border-radius:8px; background:#2563eb; color:#fff; font-weight:600; cursor:pointer; }
    .status { margin-top:10px; color:#334155; }
    .frame { border:1px solid #dbe5f1; border-radius:10px; background:#fff; overflow:hidden; min-height:58vh; height:100%; }
    iframe { width:100%; height:100%; border:0; }
    @media (max-width: 820px) {
      .grid { grid-template-columns: repeat(2, minmax(120px, 1fr)); }
      .frame { min-height:62vh; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="hero">
      <h1 style="margin:0 0 6px 0;">NeuraLink Interactive UI</h1>
      <p style="margin:0;color:#475569;">Run parameterized experiments and refresh the benchmark HTML report.</p>
      <div class="grid">
        <div><label>Run Name</label><input id="run_name" value="ui_run"></div>
        <div><label>Rows</label><input id="rows" type="number" value="8"></div>
        <div><label>Cols</label><input id="cols" type="number" value="8"></div>
        <div><label>K</label><input id="k" type="number" value="32"></div>
        <div><label>Warmup</label><input id="warmup" type="number" value="4"></div>
        <div><label>MaxBW</label><input id="maxbw" type="number" value="64"></div>
        <div><label>Operation Class</label>
          <select id="op_class">
            <option value="0">GEMM</option>
            <option value="1">Vector</option>
            <option value="2">Conv2D</option>
            <option value="3">Depthwise</option>
            <option value="4">Pooling</option>
            <option value="5">Normalization</option>
            <option value="6">Reduction</option>
            <option value="7">Attention</option>
            <option value="8">Math</option>
          </select>
        </div>
      </div>
      <button id="run_btn">Run Experiment</button>
      <div class="status" id="status">Ready.</div>
    </div>
    <div class="frame">
      <iframe id="report_iframe" src="/results/live_ui/benchmark_report.html"></iframe>
    </div>
  </div>
  <script>
    const statusEl = document.getElementById("status");
    const frame = document.getElementById("report_iframe");
    document.getElementById("run_btn").addEventListener("click", async () => {
      const payload = {
        run_name: document.getElementById("run_name").value,
        rows: Number(document.getElementById("rows").value),
        cols: Number(document.getElementById("cols").value),
        k: Number(document.getElementById("k").value),
        warmup: Number(document.getElementById("warmup").value),
        maxbw: Number(document.getElementById("maxbw").value),
        op_class: Number(document.getElementById("op_class").value)
      };
      statusEl.textContent = "Running simulation and regenerating report...";
      try {
        const resp = await fetch("/api/run", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });
        const data = await resp.json();
        if (!data.ok) throw new Error(data.error || "Run failed");
        statusEl.textContent = "Run complete. Report refreshed.";
        frame.src = data.report_path + "?t=" + Date.now();
      } catch (e) {
        statusEl.textContent = "Error: " + e.message;
      }
    });
  </script>
</body>
</html>
